<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Travel Split Pro ✈️</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TravelSplit">
<meta name="mobile-web-app-capable" content="yes">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4f7f5;
margin:0;
padding:22px;
color:#1f2937;
-webkit-tap-highlight-color: transparent;
}

.container{
max-width:720px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:22px;
font-size:28px;
color:#2c4a3f;
letter-spacing:-0.5px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:18px;
box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.input-group {
display: flex;
gap: 10px;
margin-top: 10px;
margin-bottom: 14px;
}

input, select{
width:100%;
padding:13px;
border-radius:12px;
border:1px solid #d1d5db;
font-size:15px;
box-sizing:border-box;
background:#fff;
}

.currency-select {
width: 90px;
flex-shrink: 0;
}

input:focus, select:focus{
outline:none;
border-color:#5f8f7b;
box-shadow:0 0 0 3px rgba(95,143,123,0.15);
}

/* 💡 汇率小格子样式 */
.rate-settings {
display: flex;
align-items: center;
justify-content: space-between;
background: #edf2f0;
padding: 10px 14px;
border-radius: 12px;
margin-bottom: 14px;
font-size: 13px;
}
.rate-input-wrapper {
display: flex;
align-items: center;
gap: 4px;
}
.rate-input-wrapper input {
width: 65px;
padding: 6px;
margin: 0;
border-radius: 8px;
text-align: center;
}

/* 💡 分类选择（Category）横向滚动流式样式 */
.category-title {
font-size: 14px;
font-weight: 600;
margin-bottom: 8px;
color: #4b5563;
}
.category-group {
display: flex;
gap: 8px;
overflow-x: auto;
padding-bottom: 8px;
margin-bottom: 14px;
-webkit-overflow-scrolling: touch;
}
.category-group::-webkit-scrollbar {
display: none;
}
.category-btn {
flex-shrink: 0;
padding: 8px 14px;
background: #f3f4f6;
border-radius: 20px;
font-size: 14px;
cursor: pointer;
border: 2px solid transparent;
transition: 0.15s;
user-select: none;
}
.category-btn.active {
background: #e8f5ef;
border-color: #5f8f7b;
font-weight: 600;
}

/* 💡 升级版：人员金额填报网格 */
.section-title {
margin: 18px 0 10px 0;
font-size: 16px;
color: #1f2937;
font-weight: 600;
border-left: 4px solid #5f8f7b;
padding-left: 8px;
}
.people-grid {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 18px;
}
.person-row {
display: flex;
align-items: center;
justify-content: space-between;
background: #f9fafb;
padding: 8px 14px;
border-radius: 12px;
gap: 10px;
}
.person-name {
font-size: 14px;
font-weight: 500;
width: 100px;
flex-shrink: 0;
}
.row-inputs {
display: flex;
gap: 8px;
flex-grow: 1;
}
.row-inputs input {
padding: 8px;
font-size: 13px;
margin: 0;
border-radius: 8px;
text-align: right;
}

button.main-btn {
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#5f8f7b;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.15s;
}
button.main-btn:hover{ opacity:0.92; }

#expenses {
max-height: 320px;
overflow-y: auto;
padding-right: 4px;
}

.expense{
background:#f9fafb;
padding:14px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
line-height:1.5;
position: relative;
}

.expense-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
font-weight: bold;
}

.delete-btn{
background:#ef4444;
padding:5px 10px;
font-size:12px;
width:auto;
border-radius:8px;
margin-top:8px;
}

.summary{
background:linear-gradient(135deg,#e8f5ef,#f1f7ff);
padding:12px;
border-radius:12px;
margin-top:10px;
font-weight:500;
font-size:14px;
}

.copy-btn{
background:#3b82f6;
margin-top:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>✈️ Travel Split Pro</h1>

<div class="card">
<input type="text" id="title" placeholder="Expense title (e.g. Ichiran Ramen)">

<div class="input-group">
<input type="number" id="amount" placeholder="Total Amount" inputmode="decimal" pattern="[0-9]*" oninput="autoDistribute()">
<select id="currency" class="currency-select" onchange="autoDistribute()">
<option value="JPY">¥ JPY</option>
<option value="MYR">RM MYR</option>
</select>
</div>

<div class="rate-settings">
<span>💱 本地汇率 (Exchange Rate):</span>
<div class="rate-input-wrapper">
<span>1000 JPY =</span>
<input type="number" id="exchangeRateInput" value="23.0" inputmode="decimal" onchange="saveExchangeRate(); autoDistribute();">
<span>RM</span>
</div>
</div>

<div class="category-title">🏷️ Category</div>
<div class="category-group" id="categoryGroup">
<div class="category-btn active" data-cat="🍱">🍱 餐饮</div>
<div class="category-btn" data-cat="🚇">🚇 交通</div>
<div class="category-btn" data-cat="🛍️">🛍️ 购物</div>
<div class="category-btn" data-cat="🏨">🏨 住宿</div>
<div class="category-btn" data-cat="🎟️">🎟️ 门票</div>
<div class="category-btn" data-cat="🎲">🎲 娱乐</div>
<div class="category-btn" data-cat="❓">❓ 其它</div>
</div>

<div class="section-title">👥 Who Paid & Who Shares?</div>
<div class="people-grid" id="peopleGrid"></div>

<button class="main-btn" onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3 style="margin: 0 0 10px 0; font-size:18px;">Expenses List</h3>
<div id="expenses"></div>
</div>

<div class="card">
<h3 style="margin: 0 0 10px 0; font-size:18px;">Final Settlement (RM)</h3>
<div id="summary"></div>
<button class="main-btn copy-btn" onclick="copySummary()">📋 Copy Summary</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
initializeFirestore,
persistentLocalCache,
persistentMultipleTabManager
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
apiKey: "AIzaSyBlNGAgaA6pbTsgq2lKd9MqsKFZpDar7Q8",
authDomain: "travel-split-d0fbb.firebaseapp.com",
projectId: "travel-split-d0fbb",
storageBucket: "travel-split-d0fbb.firebasestorage.app",
messagingSenderId: "252436650566",
appId: "1:252436650566:web:12306fea016a8f9f264847"
};

const app = initializeApp(firebaseConfig);

// 💡 离线支持（Offline Support）：开启持久化本地缓存，没信号也能顺畅记账！
const db = initializeFirestore(app, {
localCache: persistentLocalCache({
tabManager: persistentMultipleTabManager()
})
});
const colRef = collection(db, "expenses_v2"); // 使用新集合避免旧数据冲突

const people = ["Isaac", "BeeChing", "Malenda Teo", "Elzy Teo", "Lee Ping"];
let selectedCategory = "🍱";
let expenses = [];

// 初始化分类按钮点击事件
document.querySelectorAll('.category-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
selectedCategory = btn.getAttribute('data-cat');
});
});

// 初始化汇率与人员列表
window.addEventListener('DOMContentLoaded', () => {
const savedRate = localStorage.getItem('trip_exchange_rate');
if (savedRate) {
document.getElementById('exchangeRateInput').value = savedRate;
}
renderPeopleGrid();
});

window.saveExchangeRate = function() {
const rateValue = parseFloat(document.getElementById('exchangeRateInput').value) || 23.0;
localStorage.setItem('trip_exchange_rate', rateValue);
};

// 渲染动态输入网格
function renderPeopleGrid() {
const grid = document.getElementById("peopleGrid");
grid.innerHTML = `
<div style="display:flex; justify-content:space-between; padding:0 14px; font-size:11px; color:#6b7280; font-weight:600;">
<div style="width:100px;">Name</div>
<div style="display:flex; gap:8px; flex-grow:1;">
<div style="width:100%; text-align:right;">Paid (垫付)</div>
<div style="width:100%; text-align:right;">Share (平摊比)</div>
</div>
</div>
`;
people.forEach(p => {
grid.innerHTML += `
<div class="person-row">
<div class="person-name">${p}</div>
<div class="row-inputs">
<input type="number" class="paid-input" data-name="${p}" placeholder="0" inputmode="decimal" onchange="manualPayerCheck()">
<input type="number" class="share-input" data-name="${p}" value="1" inputmode="number" placeholder="0">
</div>
</div>
`;
});
}

// 当用户输入总金额时，自动把权重（1）转化，默认第一个人垫付
window.autoDistribute = function() {
const total = parseFloat(document.getElementById("amount").value) || 0;
const paidInputs = document.querySelectorAll(".paid-input");
// 如果用户还没手动修改过垫付者，默认让第一个人（或当前选中的人）全额垫付
let anyPaidHasValue = false;
paidInputs.forEach((input, index) => {
if(index > 0 && parseFloat(input.value) > 0) anyPaidHasValue = true;
});
if(!anyPaidHasValue && total > 0) {
paidInputs[0].value = total;
}
};

window.manualPayerCheck = function() {
// 允许用户完全自由控制谁付了多少
};

/* =========================
   ADD EXPENSE
========================= */
window.addExpense = async function () {
const title = document.getElementById("title").value || "Undocumented Expense";
const inputAmount = parseFloat(document.getElementById("amount").value);
const currency = document.getElementById("currency").value;
if (!inputAmount) return;

const currentRate = parseFloat(document.getElementById('exchangeRateInput').value) || 23.0;

// 计算多付款人实际付出的马币
let payersMap = {};
let totalVerifiedPaid = 0;
document.querySelectorAll(".paid-input").forEach(input => {
const val = parseFloat(input.value) || 0;
if (val > 0) {
const valMYR = currency === "JPY" ? parseFloat(((val / 1000) * currentRate).toFixed(2)) : val;
payersMap[input.getAttribute("data-name")] = valMYR;
totalVerifiedPaid += valMYR;
}
});

// 计算多平摊人的权重/比例
let sharesMap = {};
let totalSharesWeight = 0;
document.querySelectorAll(".share-input").forEach(input => {
const w = parseFloat(input.value) || 0;
if (w > 0) {
sharesMap[input.getAttribute("data-name")] = w;
totalSharesWeight += w;
}
});

if (Object.keys(payersMap).length === 0 || totalSharesWeight === 0) {
alert("Please specify who paid and who shares!");
return;
}

// 根据权重精确切割总支付马币，防止产生碎分
let finalSharesMap = {};
let distributedAmount = 0;
const pKeys = Object.keys(sharesMap);
pKeys.forEach((p, idx) => {
if (idx === pKeys.length - 1) {
finalSharesMap[p] = parseFloat((totalVerifiedPaid - distributedAmount).toFixed(2));
} else {
const shareAmt = parseFloat((totalVerifiedPaid * (sharesMap[p] / totalSharesWeight)).toFixed(2));
finalSharesMap[p] = shareAmt;
distributedAmount += shareAmt;
}
});

let originalNote = currency === "JPY" ? ` (¥${inputAmount})` : "";

await addDoc(colRef, {
title: selectedCategory + " " + title + originalNote,
totalAmountMYR: totalVerifiedPaid,
payers: payersMap,
shares: finalSharesMap,
time: Date.now()
});

// 重置输入
document.getElementById("title").value = "";
document.getElementById("amount").value = "";
renderPeopleGrid(); 
};

/* =========================
   REAL TIME SYNC
========================= */
onSnapshot(colRef, (snapshot) => {
expenses = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
expenses.sort((a, b) => (b.time || 0) - (a.time || 0));
render();
});

/* =========================
   DELETE
========================= */
window.del = async function (id) {
if (confirm("Are you sure you want to delete this expense?")) {
await deleteDoc(doc(db, "expenses_v2", id));
}
};

/* =========================
   RENDER UI
========================= */
function render() {
const list = document.getElementById("expenses");
list.innerHTML = "";

if (expenses.length === 0) {
list.innerHTML = `<div style="text-align:center; color:#9ca3af; padding: 20px 0;">No expenses recorded yet.</div>`;
calc();
return;
}

expenses.forEach(e => {
const pDetails = Object.entries(e.payers).map(([name, amt]) => `${name}: RM${amt.toFixed(2)}`).join(", ");
const sDetails = Object.entries(e.shares).map(([name, amt]) => `${name}: RM${amt.toFixed(2)}`).join(", ");

list.innerHTML += `
<div class="expense">
<div class="expense-header">
<span><b>${e.title}</b></span>
<span style="color:#5f8f7b;">RM${e.totalAmountMYR.toFixed(2)}</span>
</div>
<div style="font-size:12px; color:#4b5563; margin-top:4px;">
<b>Paid by:</b> ${pDetails}<br>
<b>Shared by:</b> ${sDetails}
</div>
<button class="delete-btn" onclick="del('${e.id}')">Delete</button>
</div>
`;
});

calc();
}

/* =========================
   FINAL SETTLEMENT
========================= */
function calc() {
let bal = {};
people.forEach(p => bal[p] = 0);

expenses.forEach(e => {
// 每个人在这个单子里的净盈亏 = 他付的钱 - 他该平摊的钱
people.forEach(p => {
const paid = e.payers[p] || 0;
const owed = e.shares[p] || 0;
bal[p] += (paid - owed);
});
});

let creditors = [];
let debtors = [];

for (let p in bal) {
if (bal[p] > 0.01) creditors.push({ name: p, amt: bal[p] });
if (bal[p] < -0.01) debtors.push({ name: p, amt: -bal[p] });
}

creditors.sort((a,b)=>b.amt-a.amt);
debtors.sort((a,b)=>b.amt-a.amt);

let out = [];
let i = 0, j = 0;

while (i < debtors.length && j < creditors.length) {
let d = debtors[i];
let c = creditors[j];
let pay = Math.min(-d.amt, c.amt);

if (pay > 0.01) {
out.push(`${d.name} pays ${c.name} RM${pay.toFixed(2)}`);
}

d.amt += pay;
c.amt -= pay;

if (-d.amt < 0.01) i++;
if (c.amt < 0.01) j++;
}

const summaryDiv = document.getElementById("summary");
if (out.length === 0) {
summaryDiv.innerHTML = `<div style="text-align:center; color:#9ca3af; padding: 10px 0;">All settled up! 🎉</div>`;
} else {
summaryDiv.innerHTML = out.map(x => `<div class="summary">💰 ${x}</div>`).join("");
}
}

/* =========================
   COPY SUMMARY
========================= */
window.copySummary = function () {
const items = document.querySelectorAll("#summary .summary");
if (!items.length) {
alert("No settlement summary to copy!");
return;
}
const text = Array.from(items).map(el => el.innerText).join("\n");
navigator.clipboard.writeText(text)
.then(() => alert("Copied to clipboard ✅"))
.catch(() => alert("Copy failed"));
};
</script>

</body>
</html>
