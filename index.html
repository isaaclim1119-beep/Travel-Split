<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Travel Split Pro ✈️</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TravelSplit">
<meta name="mobile-web-app-capable" content="yes">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4f7f5;
margin:0;
padding:22px;
color:#1f2937;
-webkit-tap-highlight-color: transparent;
}

.container{
max-width:720px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:22px;
font-size:28px;
color:#2c4a3f;
letter-spacing:-0.5px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:18px;
box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.input-group {
display: flex;
gap: 10px;
margin-top: 10px;
margin-bottom: 14px;
}

input, select{
width:100%;
padding:13px;
border-radius:12px;
border:1px solid #d1d5db;
font-size:15px;
box-sizing:border-box;
background:#fff;
}

.currency-select {
width: 90px;
flex-shrink: 0;
}

input:focus, select:focus{
outline:none;
border-color:#5f8f7b;
box-shadow:0 0 0 3px rgba(95,143,123,0.15);
}

/* 汇率小格子样式 */
.rate-settings {
display: flex;
align-items: center;
justify-content: space-between;
background: #edf2f0;
padding: 10px 14px;
border-radius: 12px;
margin-bottom: 14px;
font-size: 13px;
}
.rate-input-wrapper {
display: flex;
align-items: center;
gap: 4px;
}
.rate-input-wrapper input {
width: 65px;
padding: 6px;
margin: 0;
border-radius: 8px;
text-align: center;
}

/* 分类选择（流式滑动） */
.category-title {
font-size: 14px;
font-weight: 600;
margin-bottom: 8px;
color: #4b5563;
}
.category-group {
display: flex;
gap: 8px;
overflow-x: auto;
padding-bottom: 8px;
margin-bottom: 14px;
-webkit-overflow-scrolling: touch;
}
.category-group::-webkit-scrollbar {
display: none;
}
.category-btn {
flex-shrink: 0;
padding: 8px 14px;
background: #f3f4f6;
border-radius: 20px;
font-size: 14px;
cursor: pointer;
border: 2px solid transparent;
transition: 0.15s;
user-select: none;
}
.category-btn.active {
background: #e8f5ef;
border-color: #5f8f7b;
font-weight: 600;
}

.section-title {
margin: 18px 0 10px 0;
font-size: 16px;
color: #1f2937;
font-weight: 600;
}

/* 名字复选框卡片样式 */
.people{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
gap:10px;
margin-bottom:18px;
}
.person-check{
background:#f3f7f5;
padding:12px;
border-radius:12px;
font-size:14px;
display: flex;
align-items: center;
justify-content: flex-start;
gap: 8px;
cursor: pointer;
box-sizing: border-box;
user-select: none;
}
.person-check input[type="checkbox"] {
width: 16px;
height: 16px;
margin: 0;
flex-shrink: 0;
cursor: pointer;
}

button.main-btn {
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#5f8f7b;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.15s;
}
button.main-btn:hover{ opacity:0.92; }

#expenses {
max-height: 280px;
overflow-y: auto;
padding-right: 4px;
}

.expense{
background:#f9fafb;
padding:14px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
line-height:1.5;
position: relative;
}

.expense-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
font-weight: bold;
}

.delete-btn{
background:#ef4444;
padding:5px 10px;
font-size:12px;
width:auto;
border-radius:8px;
margin-top:8px;
color: white;
border: none;
cursor: pointer;
}

.summary{
background:linear-gradient(135deg,#e8f5ef,#f1f7ff);
padding:12px;
border-radius:12px;
margin-top:10px;
font-weight:500;
font-size:14px;
}

.copy-btn{
background:#3b82f6;
margin-top:12px;
}

/* 新增分类统计面板样式 */
.cat-total-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 4px;
border-bottom: 1px dashed #e5e7eb;
font-size: 14px;
}
.cat-total-row:last-child {
border-bottom: none;
}
.cat-badge {
display: flex;
align-items: center;
gap: 6px;
font-weight: 500;
}
</style>
</head>

<body>

<div class="container">

<h1>✈️ Travel Split Pro</h1>

<div class="card">
<input type="text" id="title" placeholder="Expense title (e.g. Ichiran Ramen)">

<div class="input-group">
<input type="number" id="amount" placeholder="Amount" inputmode="decimal" pattern="[0-9]*">
<select id="currency" class="currency-select">
<option value="JPY">¥ JPY</option>
<option value="MYR">RM MYR</option>
</select>
</div>

<div class="rate-settings">
<span>💱 本地汇率 (Exchange Rate):</span>
<div class="rate-input-wrapper">
<span>1000 JPY =</span>
<input type="number" id="exchangeRateInput" value="23.0" inputmode="decimal" onchange="saveExchangeRate()">
<span>RM</span>
</div>
</div>

<div class="category-title">🏷️ Category</div>
<div class="category-group" id="categoryGroup">
<div class="category-btn active" data-cat="🍱">🍱 餐饮</div>
<div class="category-btn" data-cat="🚇">🚇 交通</div>
<div class="category-btn" data-cat="🛍️">🛍️ 购物</div>
<div class="category-btn" data-cat="🏨">🏨 住宿</div>
<div class="category-btn" data-cat="🎟️">🎟️ 门票</div>
<div class="category-btn" data-cat="🎲">🎲 娱乐</div>
<div class="category-btn" data-cat="❓">❓ 其它</div>
</div>

<div class="category-title">👤 Who Paid? (谁垫付的)</div>
<select id="payer">
<option>Isaac</option>
<option>BeeChing</option>
<option>Malenda Teo</option>
<option>Elzy Teo</option>
<option>Lee Ping</option>
</select>

<div class="category-title" style="margin-top: 14px;">👥 Who Shares? (默认全选AA)</div>
<div class="people">
<label class="person-check"><input type="checkbox" value="Isaac" checked> <span>Isaac</span></label>
<label class="person-check"><input type="checkbox" value="BeeChing" checked> <span>BeeChing</span></label>
<label class="person-check"><input type="checkbox" value="Malenda Teo" checked> <span>Malenda Teo</span></label>
<label class="person-check"><input type="checkbox" value="Elzy Teo" checked> <span>Elzy Teo</span></label>
<label class="person-check"><input type="checkbox" value="Lee Ping" checked> <span>Lee Ping</span></label>
</div>

<button class="main-btn" onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3 style="margin: 0 0 10px 0; font-size:18px;">Expenses List</h3>
<div id="expenses"></div>
</div>

<div class="card">
<h3 style="margin: 0 0 10px 0; font-size:18px;">Final Settlement (RM)</h3>
<div id="summary"></div>
<button class="main-btn copy-btn" onclick="copySummary()">📋 Copy Summary</button>
</div>

<div class="card">
<h3 style="margin: 0 0 12px 0; font-size:18px;">Category Summary (RM)</h3>
<div id="categorySummaryList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
initializeFirestore,
persistentLocalCache,
persistentMultipleTabManager
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBlNGAgaA6pbTsgq2lKd9MqsKFZpDar7Q8",
authDomain: "travel-split-d0fbb.firebaseapp.com",
projectId: "travel-split-d0fbb",
storageBucket: "travel-split-d0fbb.firebasestorage.app",
messagingSenderId: "252436650566",
appId: "1:252436650566:web:12306fea016a8f9f264847"
};

const app = initializeApp(firebaseConfig);

// 开启持久化本地缓存
const db = initializeFirestore(app, {
localCache: persistentLocalCache({
tabManager: persistentMultipleTabManager()
})
});
const colRef = collection(db, "expenses_v3");

const people = ["Isaac", "BeeChing", "Malenda Teo", "Elzy Teo", "Lee Ping"];
const categories = ["🍱", "🚇", "🛍️", "🏨", "🎟️", "🎲", "❓"];
const categoryNames = { "🍱": "餐饮", "🚇": "交通", "🛍️": "购物", "🏨": "住宿", "🎟️": "门票", "🎲": "娱乐", "❓": "其它" };

let selectedCategory = "🍱";
let expenses = [];

document.querySelectorAll('.category-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
selectedCategory = btn.getAttribute('data-cat');
});
});

window.addEventListener('DOMContentLoaded', () => {
const savedRate = localStorage.getItem('trip_exchange_rate');
if (savedRate) {
document.getElementById('exchangeRateInput').value = savedRate;
}
});

window.saveExchangeRate = function() {
const rateValue = parseFloat(document.getElementById('exchangeRateInput').value) || 23.0;
localStorage.setItem('trip_exchange_rate', rateValue);
};

/* =========================
   ADD EXPENSE
========================= */
window.addExpense = async function () {
const title = document.getElementById("title").value || "Undocumented";
const inputAmount = parseFloat(document.getElementById("amount").value);
const currency = document.getElementById("currency").value;
const payer = document.getElementById("payer").value;

const sharedBy = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
.map(i => i.value);

if (!inputAmount || sharedBy.length === 0) return;

const currentRate = parseFloat(document.getElementById('exchangeRateInput').value) || 23.0;

let finalAmountMYR = inputAmount;
let originalNote = "";

if (currency === "JPY") {
finalAmountMYR = parseFloat(((inputAmount / 1000) * currentRate).toFixed(2));
originalNote = ` (¥${inputAmount})`;
} else {
finalAmountMYR = parseFloat(inputAmount.toFixed(2));
}

await addDoc(colRef, {
title: title,
category: selectedCategory, // 规范化存储分类图标
amount: finalAmountMYR,
payer,
sharedBy,
time: Date.now()
});

document.getElementById("title").value = "";
document.getElementById("amount").value = "";
document.querySelectorAll("input[type=checkbox]").forEach(c => c.checked = true);
};

/* =========================
   REAL TIME SYNC
========================= */
onSnapshot(colRef, (snapshot) => {
expenses = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
expenses.sort((a, b) => (b.time || 0) - (a.time || 0));
render();
});

/* =========================
   DELETE
========================= */
window.del = async function (id) {
if (confirm("Are you sure you want to delete this expense?")) {
await deleteDoc(doc(db, "expenses_v3", id));
}
};

/* =========================
   RENDER UI
========================= */
function render() {
const list = document.getElementById("expenses");
list.innerHTML = "";

if (expenses.length === 0) {
list.innerHTML = `<div style="text-align:center; color:#9ca3af; padding: 20px 0;">No expenses recorded yet.</div>`;
calc();
return;
}

expenses.forEach(e => {
// 兼容旧格式，如果旧记录里没有独立的 category 字段，就尝试从 title 提取图标
const displayCat = e.category || (e.title ? e.title.substring(0, 2).trim() : "❓");
const displayTitle = e.category ? e.title : e.title.replace(/^[🍱🚇🛍️🏨🎟️🎲❓]\s*/, "");

list.innerHTML += `
<div class="expense">
<div class="expense-header">
<span><b>${displayCat} ${displayTitle}</b></span>
<span style="color:#5f8f7b; font-weight:bold;">RM${(e.amount || 0).toFixed(2)}</span>
</div>
<div style="font-size:12px; color:#6b7280; margin-top:4px;">
Paid by <b>${e.payer || 'Unknown'}</b> · Shared: ${e.sharedBy ? e.sharedBy.join(", ") : 'No one'}
</div>
<button class="delete-btn" onclick="del('${e.id}')">Delete</button>
</div>
`;
});

calc();
}

/* =========================
   FINAL SETTLEMENT & CATEGORY TOTAL
========================= */
function calc() {
let bal = {};
let catTotals = {};

people.forEach(p => bal[p] = 0);
categories.forEach(c => catTotals[c] = 0);

expenses.forEach(e => {
// 💥 核心防崩溃注入：严格检查当前数据是否包含合法的 sharedBy 数组
if (!e.sharedBy || !Array.isArray(e.sharedBy) || e.sharedBy.length === 0 || !e.amount) {
return; // 发现不兼容的旧测试数据，自动跳过，绝不卡死
}

// 1. 正常计算记账清算
let share = e.amount / e.sharedBy.length;
e.sharedBy.forEach(p => {
if (bal.hasOwnProperty(p)) bal[p] -= share;
});
if (bal.hasOwnProperty(e.payer)) bal[e.payer] += e.amount;

// 2. 正常统计分类总数
const catKey = e.category || e.title.substring(0, 2).trim();
if (catTotals.hasOwnProperty(catKey)) {
catTotals[catKey] += e.amount;
} else {
catTotals["❓"] += e.amount; // 匹配不到的统一归为其它
}
});

// 计算债务抵消列表
let creditors = [];
let debtors = [];

for (let p in bal) {
let exactBal = parseFloat(bal[p].toFixed(2));
if (exactBal > 0.01) creditors.push({ name: p, amt: exactBal });
if (exactBal < -0.01) debtors.push({ name: p, amt: Math.abs(exactBal) });
}

creditors.sort((a,b)=>b.amt-a.amt);
debtors.sort((a,b)=>b.amt-a.amt);

let out = [];
let i = 0, j = 0;

while (i < debtors.length && j < creditors.length) {
let d = debtors[i];
let c = creditors[j];
let pay = Math.min(d.amt, c.amt);
pay = parseFloat(pay.toFixed(2));

if (pay > 0.01) {
out.push(`${d.name} pays ${c.name} RM${pay.toFixed(2)}`);
}

d.amt = parseFloat((d.amt - pay).toFixed(2));
c.amt = parseFloat((c.amt - pay).toFixed(2));

if (d.amt <= 0.01) i++;
if (c.amt <= 0.01) j++;
}

// 渲染最终清算
const summaryDiv = document.getElementById("summary");
if (out.length === 0) {
summaryDiv.innerHTML = `<div style="text-align:center; color:#9ca3af; padding: 10px 0;">All settled up! 🎉</div>`;
} else {
summaryDiv.innerHTML = out.map(x => `<div class="summary">💰 ${x}</div>`).join("");
}

// 渲染每个分类的总金额统计
const catDiv = document.getElementById("categorySummaryList");
let totalAll = 0;
let catHTML = "";

categories.forEach(c => {
const amt = catTotals[c] || 0;
totalAll += amt;
if (amt > 0) {
catHTML += `
<div class="cat-total-row">
<div class="cat-badge"><span>${c}</span> <span>${categoryNames[c]}</span></div>
<div style="font-weight: 600; color: #374151;">RM ${amt.toFixed(2)}</div>
</div>
`;
}
});

if (totalAll === 0) {
catDiv.innerHTML = `<div style="text-align:center; color:#9ca3af; padding: 10px 0;">No category data.</div>`;
} else {
catHTML += `
<div class="cat-total-row" style="border-top: 2px solid #5f8f7b; margin-top: 8px; padding-top: 12px; font-weight: bold; color: #2c4a3f;">
<div class="cat-badge">💵 <span>总计花费 (Total)</span></div>
<div style="font-size: 16px;">RM ${totalAll.toFixed(2)}</div>
</div>
`;
catDiv.innerHTML = catHTML;
}
}

/* =========================
   COPY SUMMARY
========================= */
window.copySummary = function () {
const items = document.querySelectorAll("#summary .summary");
if (!items.length) {
alert("No settlement summary to copy!");
return;
}
const text = Array.from(items).map(el => el.innerText).join("\n");
navigator.clipboard.writeText(text)
.then(() => alert("Copied to clipboard ✅"))
.catch(() => alert("Copy failed"));
};
</script>

</body>
</html>
